services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  user-service:
    build: ./user-service
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/user_db
      SECRET_KEY: my-secret-key-in-production-123-456
    depends_on:
      - postgres

  steam-service:
    build: ./steam-service
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/steam_db
      SECRET_KEY: my-secret-key-in-production-123-456
      REDIS_URL: redis://redis:6379
      STEAM_API_KEY: ${STEAM_API_KEY}
    depends_on:
      - postgres
      - redis

  timer-service:
    build: ./timer-service
    ports:
      - "8002:8002"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/timer_db
      SECRET_KEY: my-secret-key-in-production-123-456
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis

  notification-service:
    build: ./notification-service
    ports:
      - "8003:8003"
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}

  stats-service:
    build: ./stats-service
    ports:
      - "8004:8004"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/timer_db
      SECRET_KEY: my-secret-key-in-production-123-456
    depends_on:
      - postgres

volumes:
  postgres_data: